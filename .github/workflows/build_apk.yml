name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'app/**'

concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libssl-dev \
            libtool \
            unzip \
            zip \
            zlib1g-dev \
            autoconf \
            automake \
            cmake \
            lld

      - name: Install Buildozer and Cython
        run: pip install buildozer cython

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            app/.buildozer
          key: buildozer-v3-${{ hashFiles('app/buildozer.spec') }}
          restore-keys: |
            buildozer-v3-

      - name: Build APK
        working-directory: app
        run: |
          set -o pipefail
          yes | buildozer -v android debug 2>&1 | tee build.log
          echo "Build exit code: $?"

      - name: Check build output
        if: always()
        working-directory: app
        run: |
          echo "=== Checking for APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found anywhere"
          echo ""
          echo "=== Contents of bin/ ==="
          ls -la bin/ 2>/dev/null || echo "bin/ directory does not exist"
          echo ""
          echo "=== Last 50 lines of build log ==="
          tail -50 build.log 2>/dev/null || echo "No build log"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-podcasts-apk
          path: app/bin/*.apk
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: app/build.log
          if-no-files-found: warn
