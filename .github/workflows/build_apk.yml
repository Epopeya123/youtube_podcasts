name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'app/**'
      - '.github/workflows/build_apk.yml'

concurrency:
  group: build-apk
  cancel-in-progress: true

env:
  BUILDOZER_WARN_ON_ROOT: "0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git libffi-dev libssl-dev \
            libtool unzip zip zlib1g-dev autoconf \
            automake cmake lld ccache

      - name: Install Buildozer and Cython
        run: |
          # Pin Cython <3 because pyjnius doesn't compile with Cython 3.x
          pip install "cython<3" buildozer

      - name: Cache Buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-v3
          restore-keys: buildozer-global-

      - name: Cache Buildozer local
        uses: actions/cache@v4
        with:
          path: app/.buildozer
          key: buildozer-local-v3-${{ hashFiles('app/buildozer.spec') }}
          restore-keys: buildozer-local-v2-

      - name: Build APK
        working-directory: app
        run: |
          set -e
          echo "=== Build info ==="
          echo "Python: $(python --version)"
          echo "Cython: $(cython --version 2>&1)"
          echo "Buildozer: $(pip show buildozer | grep Version)"
          echo ""
          buildozer -v android debug 2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo ""
          echo "=== Buildozer exit code: $EXIT_CODE ==="
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Build failed!"
            exit $EXIT_CODE
          fi
          if ! ls bin/*.apk 1>/dev/null 2>&1; then
            echo "ERROR: Build completed but no APK found in bin/"
            exit 1
          fi
          echo "APK built successfully:"
          ls -la bin/*.apk

      - name: Save build log to repo (so it can be checked remotely)
        if: always()
        run: |
          mkdir -p build-logs
          if [ -f app/build.log ]; then
            # Save last 500 lines (most relevant part)
            tail -500 app/build.log > build-logs/latest-build.log
          else
            echo "No build log produced" > build-logs/latest-build.log
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build-logs/latest-build.log
          git diff --cached --quiet || git commit -m "Update build log [skip ci]"
          git push || true

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-podcasts-apk
          path: app/bin/*.apk
          if-no-files-found: warn

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: app/build.log
          if-no-files-found: warn
