name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'app/**'

concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libssl-dev \
            libtool \
            unzip \
            zip \
            zlib1g-dev \
            autoconf \
            automake \
            cmake \
            lld

      - name: Install Buildozer and Cython
        run: pip install buildozer cython

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            app/.buildozer
          key: buildozer-v2-${{ hashFiles('app/buildozer.spec') }}
          restore-keys: |
            buildozer-v2-

      - name: Build APK
        working-directory: app
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-podcasts-apk
          path: app/bin/*.apk

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: app/build.log
