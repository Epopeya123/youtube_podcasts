name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'app/**'
      - '.github/workflows/build_apk.yml'

concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build APK using official Kivy Docker image
        run: |
          cd app
          docker run \
            --volume "$(pwd)":/home/user/hostcwd \
            --workdir /home/user/hostcwd \
            kivy/buildozer:latest \
            buildozer -v android debug 2>&1 | tee build.log
          echo "Build finished with exit code: ${PIPESTATUS[0]}"

      - name: Check build output
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Contents of app/bin/ ==="
          ls -la app/bin/ 2>/dev/null || echo "app/bin/ does not exist"
          echo ""
          echo "=== Last 100 lines of build log ==="
          tail -100 app/build.log 2>/dev/null || echo "No build log found"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-podcasts-apk
          path: app/bin/*.apk
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: app/build.log
          if-no-files-found: warn
